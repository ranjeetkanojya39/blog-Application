{% extends 'blog/base.html' %}
{% load static %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">
            <div class="card p-4 shadow-sm">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <img src="{% static 'images/logo.png' %}" 
                         class="rounded-circle" width="120" alt="logo">
                </div>

                <!-- Login Form -->
                <form method="post">
                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3">
                        <input type="text" 
                               name="uname" 
                               class="form-control" 
                               placeholder="Enter Username" 
                               required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <input type="password" 
                               name="upassword" 
                               class="form-control" 
                               placeholder="Enter Password" 
                               required>
                    </div>

                    <!-- Button -->
                    <button type="submit" 
                            class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

                <!-- Register Link -->
                <p class="text-center mt-3">
                    Not registered? 
                    <a href="/">Create Account</a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Blog App</title>

    <style>
        body {
            background-color: #f8f9fa;
        }
        .custom-container {
            max-width: 1200px;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container custom-container">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'home-page' %}">
            BlogApp
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home-page' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'my-post' %}">My Posts</a>
                </li>
            </ul>

            <!-- Right Side -->
            <div class="d-flex">

                {% if user.is_authenticated %}
                    <a href="{% url 'new-post' %}" class="btn btn-success me-2">+ New Post</a>
                    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
                {% else %}
                    <a href="{% url 'login-page' %}" class="btn btn-primary me-2">Login</a>
                    <a href="{% url 'login-page' %}" class="btn btn-outline-light">Sign Up</a>
                {% endif %}

            </div>

        </div>

    </div>
</nav>


<!-- 🔔 MESSAGES -->
<div class="container mt-3 custom-container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
</div>


<!-- 📄 CONTENT -->
<div class="container mt-4 custom-container">
    {% block content %}
    {% endblock %}
</div>


<!-- ⚡ FOOTER -->
<footer class="bg-dark text-light text-center p-3 mt-5">
    <p class="mb-0">© 2026 BlogApp | Made with ❤️</p>
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
